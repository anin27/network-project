---
- name: Deploy Docker Nginx App
  hosts: web
  become: yes
  gather_facts: no

  tasks:

    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Copy app folder to EC2
      copy:
        src: ../app/
        dest: /home/ec2-user/app/
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Build Docker image
      command: docker build -t network-app .
      args:
        chdir: /home/ec2-user/app/

    - name: Run Docker container
      command: docker run -d -p 80:80 --name network-container network-app
      ignore_errors: yes
