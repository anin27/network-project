name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Ansible Syntax Check
        run: |
          ansible-playbook ansible/nginx-playbook.yml --syntax-check

      - name: Validate Dockerfile
        run: |
          if [ -f app/Dockerfile ]; then
            echo "Dockerfile exists"
          else
            echo "Dockerfile missing"
            exit 1
          fi


deploy:
    needs: build-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible
      - name: Update Inventory
        run: |
          echo "[web]" > ansible/inventory
          echo "3.252.234.128 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_rsa" >> ansible/inventory
      - name: Deploy via Ansible
        run: |
          ansible-playbook -i ansible/inventory ansible/nginx-playbook.yml \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
